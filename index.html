<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>社區團購站</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="home">
  <div class="app-shell">
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="index.html">社區小舖</a>
        <nav class="nav">
          <a class="active" href="index.html">首頁</a>
          <a href="products.html">商品</a>
          <a href="wish.html">許願池</a>
          <a href="order-search.html">查詢訂單</a>
        </nav>
      </div>
      <div class="announcement-ticker">
        <div class="container">
          <div class="ticker-track" id="announcementList"></div>
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container">
          <div class="hero-card">
            <p class="eyebrow">本週小店選物</p>
            <h1>今天想買點什麼好東西？</h1>
            <p>幫大家挑好日常實用的好物，先預訂、到點取貨，簡單又安心。</p>
            <div class="pill-row">
              <span class="pill">社區面交</span>
              <span class="pill">小量新鮮</span>
              <span class="pill">每週精選</span>
            </div>
          </div>
        </div>
      </section>

      <section class="container spotlight-section" id="homeSpotlightSection" hidden>
        <div id="homeSpotlight"></div>
      </section>

      <section class="container">
        <div class="section-head">
          <h2>🔥 熱門商品</h2>
          <p>大家最近最常預訂</p>
        </div>
        <div class="grid rank-grid" id="hotProductList"></div>
      </section>

      <section class="container">
        <div class="section-head">
          <h2>最新商品</h2>
          <p>剛上架的社區好物</p>
        </div>
        <div class="grid product-grid featured-grid" id="latestProductList"></div>
      </section>

      <section class="container">
        <div class="section-head">
          <h2>即將截止商品</h2>
          <p>想買要快一點</p>
        </div>
        <div class="grid ending-grid" id="endingProductList"></div>
      </section>

      <section class="container reopen-section" id="homeReopenSection" hidden>
        <div class="section-head">
          <h2>最近截止，可許願再開團</h2>
          <p>錯過也可以 +1，票數高的優先安排</p>
        </div>
        <div class="grid product-grid featured-grid" id="homeReopenProductList"></div>
      </section>

      <section class="container">
        <div class="card card-body shop-entry">
          <div>
            <p class="eyebrow">本週好物已上架</p>
            <h2>去看看今天有什麼</h2>
            <p class="muted">水果、日用品、零食與社區常備好物，都整理在商品頁。</p>
          </div>
          <a class="btn inline" href="products.html">逛全部商品</a>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <a class="active" href="index.html">首頁</a>
      <a href="products.html">商品</a>
      <a href="wish.html">許願池</a>
      <a href="order-search.html">查詢</a>
    </nav>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
