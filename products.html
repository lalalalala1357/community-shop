<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="description" content="瀏覽社區小舖全部團購商品，快速搜尋、分類篩選，看到喜歡的先預訂。">
  <meta name="theme-color" content="#fb923c">
  <link rel="canonical" href="https://lalalalala1357.github.io/community-shop/products.html">
  <meta property="og:locale" content="zh_TW">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="社區小舖">
  <meta property="og:title" content="全部商品｜社區小舖">
  <meta property="og:description" content="瀏覽社區小舖全部團購商品，快速搜尋、分類篩選，看到喜歡的先預訂。">
  <meta property="og:url" content="https://lalalalala1357.github.io/community-shop/products.html">
  <meta property="og:image" content="https://lalalalala1357.github.io/community-shop/assets/og-community-shop.svg">
  <meta property="og:image:type" content="image/svg+xml">
  <meta property="og:image:alt" content="社區小舖">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="全部商品｜社區小舖">
  <meta name="twitter:description" content="瀏覽社區小舖全部團購商品，快速搜尋、分類篩選，看到喜歡的先預訂。">
  <meta name="twitter:image" content="https://lalalalala1357.github.io/community-shop/assets/og-community-shop.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="publicProducts">
  <div class="app-shell">
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="index.html">社區小舖</a>
        <nav class="nav">
          <a href="index.html">首頁</a>
          <a class="active" href="products.html">商品</a>
          <a href="wish.html">許願池</a>
          <a href="order-search.html">查詢訂單</a>
        </nav>
      </div>
    </header>
    <main class="container">
      <div class="section-head">
        <h1>全部商品</h1>
        <p>慢慢挑，看到喜歡的先預訂</p>
      </div>
      <div class="card card-body product-controls">
        <div class="field">
          <label>搜尋商品</label>
          <input id="productSearch" type="search" placeholder="搜尋商品名稱、品牌、規格">
        </div>
        <div class="field">
          <label>排序</label>
          <select id="productSort">
            <option value="latest">最新</option>
            <option value="popular">熱門</option>
            <option value="price-desc">價格高→低</option>
            <option value="price-asc">價格低→高</option>
          </select>
        </div>
      </div>
      <div class="quick-filter-bar" id="productQuickFilters" aria-label="商品快捷篩選"></div>
      <div class="category-filter" id="categoryFilter"></div>
      <div class="grid product-grid" id="productList"></div>
      <section class="reopen-section" id="productReopenSection" hidden>
        <div class="section-head">
          <h2>最近截止，可許願再開團</h2>
          <p>有想買的商品可以 +1，方便下次安排</p>
        </div>
        <div class="grid product-grid" id="productReopenList"></div>
      </section>
    </main>
    <nav class="bottom-nav">
      <a href="index.html">首頁</a>
      <a class="active" href="products.html">商品</a>
      <a href="wish.html">許願池</a>
      <a href="order-search.html">查詢</a>
    </nav>
  </div>
  <script type="module" src="js/app.js?v=20260716c"></script>
</body>
</html>
